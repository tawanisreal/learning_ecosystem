name: Daily Assignment Notify

on:
  schedule:
    # รันทุกวันเวลา 08:00 น. เวลาไทย (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch: # เปิดให้กดรันเองได้จากหน้าเว็บ GitHub

jobs:
  run-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install gspread google-auth line-bot-sdk pandas
          
      - name: Run script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python line_oa_notify.py
